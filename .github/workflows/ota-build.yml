name: Build & Deploy OTA

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 Platform
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Install Libraries
        run: |
          arduino-cli lib install "DHT sensor library"
          arduino-cli lib install "Adafruit Unified Sensor"
          arduino-cli lib install "ArduinoJson@6.21.5"

      - name: Compile Firmware
        run: |
          arduino-cli compile --fqbn esp32:esp32:lolin32-lite --output-dir ./ota ItedaFirmware.ino
          mv ./ota/ItedaFirmware.ino.bin ./ota/ItedaFirmware.bin

      - name: Generate OTA Manifest
        run: |
          echo '{
            "version": "v1.0.${{ github.run_number }}",
            "bin_url": "https://bujo-eayn.github.io/ItedaFirmware/ota/ItedaFirmware.bin"
          }' > ota/manifest.json

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./ota